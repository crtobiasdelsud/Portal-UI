name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci || npm install

      - name: Detect bump type from commit message
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qE '\[major\]'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE '\[minor\]'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version + tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Compute next version without committing/tagging yet
          NEXT_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
          echo "Next version: $NEXT_VERSION"

          # If the tag already exists on the remote (leftover from a previous failed run),
          # bump again until we find a free version.
          while git ls-remote --tags origin | grep -q "refs/tags/${NEXT_VERSION}$"; do
            echo "Tag $NEXT_VERSION already exists on remote, bumping again..."
            # Revert the previous bump to package.json before bumping again
            git checkout -- package.json package-lock.json 2>/dev/null || git checkout -- package.json
            NEXT_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
            echo "Next version: $NEXT_VERSION"
          done

          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: release ${NEXT_VERSION} [skip ci]"
          git tag "$NEXT_VERSION"
          git push --follow-tags

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
